{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist masthead__brand {% if page.url == '/' or page.url == '/index.html' %}selected{% endif %}">
            <a href="{{ base_path }}/">{{ site.title }}</a>
          </li>
          <li class="masthead__menu-item masthead__nav-cluster">
            <ul class="masthead__nav-cluster-list">
              {% for link in site.data.navigation.main %}
                {% if link.url contains 'http' %}
                  {% assign domain = '' %}
                {% else %}
                  {% assign domain = base_path %}
                {% endif %}
                <li class="masthead__menu-item masthead__nav-link {% if page.url contains link.url and link.url != '/' %}selected{% endif %}">
                  <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
                </li>
              {% endfor %}
            </ul>
          </li>
        </ul>
        <div class="mobile-nav-row">
          <div class="mobile-nav-left">
            <a
              href="{{ base_path }}/"
              class="mobile-nav-brand{% if page.url == '/' or page.url == '/index.html' %} mobile-nav-brand--active{% endif %}"
            >{{ site.title }}</a>
          </div>
          <div class="mobile-nav-right">
            <div id="theme-toggle" class="masthead__menu-item masthead__theme">
              <a role="button" aria-label="Toggle dark mode" aria-labelledby="theme-icon"><i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="toggle theme"></i></a>
            </div>
            <button type="button" class="greedy-nav__toggle menu-button" aria-label="Menu" aria-expanded="false" aria-controls="site-nav-menu">
              <span class="greedy-nav__toggle-icon" aria-hidden="true">☰</span>
              <span class="greedy-nav__toggle-close" aria-hidden="true">✕</span>
              <span class="greedy-nav__toggle-label">Menu</span>
            </button>
          </div>
        </div>
        <ul id="site-nav-menu" class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
<script>
  (function () {
    var icon = document.getElementById("theme-icon");
    if (!icon) {
      return;
    }

    var isDark =
      document.documentElement.getAttribute("data-theme") === "dark" ||
      document.documentElement.getAttribute("data-theme-active") === "dark";

    icon.classList.toggle("fa-sun", !isDark);
    icon.classList.toggle("fa-moon", isDark);
  })();
</script>
